name: Mock safety check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mock-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-mock-safety.mjs
      - run: npm ci
      - name: Production build smoke test (exercises next.config.ts guard)
        run: npm run build
        env:
          NODE_ENV: production
