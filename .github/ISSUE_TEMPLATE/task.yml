name: Task
description: Represents an implementation task.
title: "[Task]: "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to outline an implementation task.
  - type: input
    id: task_title
    attributes:
      label: Task Title
    validations:
      required: true
  - type: input
    id: parent_feature
    attributes:
      label: Parent Feature
      description: Link to the parent Feature issue.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the task in detail.
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What are the concrete deliverables?
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: input
    id: estimated_hours
    attributes:
      label: Estimated Hours
    validations:
      required: true
  - type: input
    id: module
    attributes:
      label: Module
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: input
    id: assignee
    attributes:
      label: Assignee
    validations:
      required: true
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following have been considered.
      options:
        - label: Code Complete
          required: false
        - label: Unit Tests
          required: false
        - label: Documentation Updated
          required: false
        - label: Code Reviewed
          required: false
        - label: Ready for Merge
          required: false
  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
    validations:
      required: false
