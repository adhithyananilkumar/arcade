name: Documentation
description: Documentation improvements.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form for documentation improvements.
  - type: input
    id: doc_title
    attributes:
      label: Title
      description: Title for the documentation task.
    validations:
      required: true
  - type: dropdown
    id: documentation_type
    attributes:
      label: Documentation Type
      options:
        - README
        - API
        - Architecture
        - Deployment
        - Developer Guide
        - User Guide
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What documentation needs to be improved or created?
    validations:
      required: true
  - type: input
    id: related_feature
    attributes:
      label: Related Feature
      description: Link to any related feature or task.
    validations:
      required: false
  - type: textarea
    id: files_to_update
    attributes:
      label: Files to Update
      description: Which files or sections need updating?
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Any reference links or materials.
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: input
    id: assignee
    attributes:
      label: Assignee
    validations:
      required: true
  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
    validations:
      required: false
